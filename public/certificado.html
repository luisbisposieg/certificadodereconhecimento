<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gerador de Certificados — Aniversário de Casa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Figtree', sans-serif; background: #eef0f3; color: #110024; }
  .app { display: grid; grid-template-columns: 360px 1fr; min-height: 100vh; }
  .sidebar { background: #fff; padding: 28px 24px; border-right: 1px solid #e5e7eb; overflow-y: auto; }
  .sidebar h1 { font-size: 18px; margin: 0 0 4px; font-weight: 800; }
  .sidebar p.sub { font-size: 13px; color: #6b7280; margin: 0 0 24px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: #374151; margin-bottom: 6px; }
  .field input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font: inherit; font-size: 14px; }
  .field input:focus { outline: none; border-color: #6F2ABE; box-shadow: 0 0 0 3px rgba(111,42,190,.15); }
  .btn { width: 100%; padding: 12px 16px; border-radius: 10px; border: none; font: inherit; font-weight: 700; font-size: 14px; cursor: pointer; transition: transform .05s, opacity .2s; }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: #110024; color: #fff; }
  .btn-secondary { background: #BF8CFF; color: #110024; margin-top: 10px; }
  .btn-ghost { background: #f3f3f6; color: #110024; margin-top: 8px; }
  .divider { height: 1px; background: #e5e7eb; margin: 24px 0; }
  .csv-zone { border: 2px dashed #d1d5db; border-radius: 10px; padding: 16px; text-align: center; font-size: 13px; color: #6b7280; cursor: pointer; }
  .csv-zone:hover { border-color: #6F2ABE; color: #110024; }
  .csv-zone input { display: none; }
  .stage { display: flex; align-items: center; justify-content: center; padding: 40px; }
  .scaler { transform-origin: top center; }
  /* Certificate — 1920 x 1080 landscape */
  .cert {
    width: 1920px; height: 1080px; background: #ffffff; position: relative; overflow: hidden;
    font-family: 'Figtree', sans-serif; color: #110024;
  }
  .cert .logo { position: absolute; top: 80px; left: 110px; color: #110024; }
  .cert .logo svg { display: block; width: 150px; height: auto; }
  .cert .content { position: absolute; left: 110px; top: 380px; width: 1000px; z-index: 2; }
  .cert .t1 { font-size: 60px; font-weight: 500; line-height: 1; letter-spacing: -0.02em; }
  .cert .t2 { font-size: 60px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; margin-top: 8px; }
  .cert .years { font-size: 180px; font-weight: 900; color: var(--accent, #BF8CFF); line-height: 1; margin-top: 24px; letter-spacing: -0.03em; }
  .cert .name { font-size: 28px; font-weight: 800; text-transform: uppercase; margin-top: 40px; letter-spacing: 0.02em; }
  .cert .msg { font-size: 24px; font-weight: 500; line-height: 1.4; margin-top: 8px; color: #1f1235; max-width: 820px; }
  .cert .pill {
    position: absolute; left: 110px; bottom: 100px; z-index: 2;
    background: var(--accent, #BF8CFF); color: #fff; font-weight: 700; font-size: 24px;
    padding: 22px 44px; border-radius: 999px;
  }
  .cert .deco {
    position: absolute; right: -40px; top: 40px; width: 520px; height: 520px;
    color: var(--accent, #BF8CFF); pointer-events: none; user-select: none;
    overflow: hidden;
  }
  .cert .deco svg { width: 100%; height: 100%; display: block; }
  .footer-note { padding: 12px; font-size: 12px; color: #6b7280; text-align: center; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h1>Certificado de Aniversário</h1>
    <p class="sub">Preencha os dados e baixe o PDF.</p>

    <div class="field">
      <label>Nome completo</label>
      <input id="f-nome" type="text" value="Nome Sobrenome Completo" />
    </div>
    <div class="field">
      <label>Anos de casa</label>
      <input id="f-anos" type="number" min="1" value="1" />
    </div>
    <div class="field">
      <label>Data da celebração</label>
      <input id="f-data" type="date" />
    </div>

    <button class="btn btn-primary" id="btn-pdf">Baixar PDF</button>
    <button class="btn btn-ghost" id="btn-png">Baixar PNG</button>

    <div class="divider"></div>

    <label class="csv-zone" id="csv-zone">
      <strong>Upload CSV em lote</strong><br />
      colunas: nome, anos, data
      <input id="f-csv" type="file" accept=".csv" />
    </label>
    <button class="btn btn-secondary" id="btn-zip" disabled>Gerar ZIP com PDFs</button>
    <div class="footer-note" id="csv-status"></div>
  </aside>

  <main class="stage">
    <div class="scaler" id="scaler">
      <div class="cert" id="cert">
        <div class="logo" id="c-logo"></div>
        <div class="deco" id="c-deco"></div>
        <div class="content">
          <div class="t1">CERTIFICADO DE</div>
          <div class="t2">RECONHECIMENTO</div>
          <div class="years" id="c-years">1 ANO</div>
          <div class="name" id="c-name">NOME SOBRENOME COMPLETO,</div>
          <div class="msg" id="c-msg">estamos felizes em celebrar com você 1 ano de parceria e crescimento.</div>
        </div>
        <div class="pill">Aqui você faz a diferença!</div>
      </div>
    </div>
  </main>
</div>

<script>
const $ = (id) => document.getElementById(id);
const cert = $('cert');

function colorFor(anos) {
  anos = parseInt(anos, 10) || 0;
  if (anos <= 5) return '#BF8CFF';
  if (anos <= 10) return '#A95DFF';
  if (anos <= 15) return '#6F2ABE';
  return '#110024';
}

function anosLabel(n) {
  n = parseInt(n, 10) || 0;
  return n === 1 ? '1 ANO' : `${n} ANOS`;
}
function anosText(n) {
  n = parseInt(n, 10) || 0;
  return n === 1 ? '1 ano' : `${n} anos`;
}

function render({nome, anos, data}) {
  const accent = colorFor(anos);
  cert.style.setProperty('--accent', accent);
  $('c-years').textContent = anosLabel(anos);
  $('c-years').style.color = accent;
  $('c-name').textContent = (nome || '').toUpperCase() + ',';
  $('c-msg').textContent = `estamos felizes em celebrar com você ${anosText(anos)} de parceria e crescimento.`;
}

function readForm() {
  return {
    nome: $('f-nome').value.trim(),
    anos: $('f-anos').value,
    data: $('f-data').value,
  };
}

function update() { render(readForm()); }
['f-nome','f-anos','f-data'].forEach(id => $(id).addEventListener('input', update));

// Responsive scale of preview to fit viewport
function fitScale() {
  const stage = document.querySelector('.stage');
  const scaler = $('scaler');
  const availW = stage.clientWidth - 40;
  const availH = stage.clientHeight - 40;
  const scale = Math.min(availW / 1920, availH / 1080, 1);
  scaler.style.transform = `scale(${scale})`;
  scaler.style.width = '1920px';
  scaler.style.height = (1080 * scale) + 'px';
}
window.addEventListener('resize', fitScale);

// Canvas render
async function renderCanvas() {
  const prevTransform = $('scaler').style.transform;
  $('scaler').style.transform = 'scale(1)';
  const canvas = await html2canvas(cert, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
  $('scaler').style.transform = prevTransform;
  return canvas;
}

async function generatePdfBlob() {
  const canvas = await renderCanvas();
  const imgData = canvas.toDataURL('image/jpeg', 0.95);
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  pdf.addImage(imgData, 'JPEG', 0, 0, 297, 210);
  return pdf.output('blob');
}

async function generatePngBlob() {
  const canvas = await renderCanvas();
  return await new Promise(res => canvas.toBlob(res, 'image/png'));
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

$('btn-pdf').addEventListener('click', async () => {
  const data = readForm();
  render(data);
  await new Promise(r => setTimeout(r, 50));
  const blob = await generatePdfBlob();
  downloadBlob(blob, `certificado-${(data.nome||'colaborador').replace(/\s+/g,'_')}.pdf`);
});

$('btn-png').addEventListener('click', async () => {
  const data = readForm();
  render(data);
  await new Promise(r => setTimeout(r, 50));
  const blob = await generatePngBlob();
  downloadBlob(blob, `certificado-${(data.nome||'colaborador').replace(/\s+/g,'_')}.png`);
});

// CSV batch
let csvRows = [];
$('f-csv').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  Papa.parse(file, {
    header: true, skipEmptyLines: true,
    complete: (res) => {
      csvRows = res.data.map(r => ({
        nome: r.nome || r.Nome || r.NOME || '',
        anos: r.anos || r.Anos || r.ANOS || '',
        data: r.data || r.Data || r.DATA || ''
      })).filter(r => r.nome);
      $('csv-status').textContent = `${csvRows.length} registros carregados`;
      $('btn-zip').disabled = csvRows.length === 0;
    },
    error: (err) => { $('csv-status').textContent = 'Erro ao ler CSV: ' + err.message; }
  });
});

$('btn-zip').addEventListener('click', async () => {
  if (!csvRows.length) return;
  const zip = new JSZip();
  const original = readForm();
  $('btn-zip').disabled = true;
  for (let i = 0; i < csvRows.length; i++) {
    const row = csvRows[i];
    $('csv-status').textContent = `Gerando ${i+1}/${csvRows.length}...`;
    render(row);
    await new Promise(r => setTimeout(r, 30));
    const blob = await generatePdfBlob();
    const safe = (row.nome||'colab').replace(/[^a-z0-9]+/gi,'_');
    zip.file(`certificado-${safe}-${row.anos}anos.pdf`, blob);
  }
  const zipBlob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement('a');
  a.href = url; a.download = 'certificados.zip'; a.click();
  URL.revokeObjectURL(url);
  $('csv-status').textContent = `${csvRows.length} certificados gerados`;
  render(original);
  $('btn-zip').disabled = false;
});

// init
async function loadSvgs() {
  const [logo, deco] = await Promise.all([
    fetch('/assets/logo.svg').then(r => r.text()),
    fetch('/assets/union.svg').then(r => r.text()),
  ]);
  $('c-logo').innerHTML = logo;
  $('c-deco').innerHTML = deco;
}
loadSvgs().then(() => update());
$('f-data').valueAsDate = new Date();
update();
setTimeout(fitScale, 100);
window.addEventListener('load', fitScale);
</script>
</body>
</html>
